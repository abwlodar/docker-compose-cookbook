services:
  firefly:
    image: fireflyiii/core:latest
    container_name: firefly
    hostname: firefly
    restart: always
    env_file: .env
    volumes:
      - ./upload:/var/www/html/storage/upload
    expose:
      - "8080"
    depends_on:
      - firefly-db

  firefly-db:
    image: mariadb:lts
    container_name: firefly-db
    hostname: firefly-db
    restart: always
    env_file: .env
    environment:
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./db:/var/lib/mysql

  firefly-importer:
    image: fireflyiii/data-importer:latest
    container_name: firefly-importer
    hostname: firefly-importer
    restart: always
    env_file: .env
    environment:
      - FIREFLY_III_URL=http://firefly:8080
      - VANITY_URL=https://firefly.${DOMAIN}
      - FIREFLY_III_ACCESS_TOKEN=${FIREFLY_III_ACCESS_TOKEN}
    expose:
      - "8080"
    depends_on:
      - firefly

  firefly-cron:
    image: alpine
    container_name: firefly-cron
    restart: always
    env_file: .env
    command: sh -c " apk add tzdata && (ln -fs /usr/share/zoneinfo/$$TZ /etc/localtime || true) && echo \"0 3 * * * wget -qO- http://firefly:8080/api/v1/cron/$$STATIC_CRON_TOKEN;echo\" | crontab - && crond -f -L /dev/stdout"
    depends_on:
      - firefly

networks:
  default:
    name: $DOCKER_MY_NETWORK
    external: true
